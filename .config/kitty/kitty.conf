# kitty.conf — minimal clean config

# Fonts
font_family      Fira Code Regular
font_size        12.0
disable_ligatures never

# Cursor
cursor            #c0caf5
cursor_text_color #1a1b26
cursor_shape      block

# URLs
url_color #9ece6a

# Window
window_border_width        1pt
window_margin_width        1
single_window_margin_width 0
active_border_color        #ccadf2
inactive_border_color      #1f2134
background_opacity         1.0
confirm_os_window_close    0

# macOS
shell_integration no-cursor

# Tab bar
tab_bar_style    separator
tab_separator    ""
tab_bar_background none
tab_title_template        "{fmt.fg._3c4157}{fmt.bg.default}{fmt.fg._abb2bf}{fmt.bg._3c4157} {tab.active_wd.split('/')[-1]} {fmt.fg._3c4157}{fmt.bg.default} "
active_tab_title_template "{fmt.fg._8d8be0}{fmt.bg.default}{fmt.fg._282c34}{fmt.bg._8d8be0} {tab.active_wd.split('/')[-1]} {fmt.fg._8d8be0}{fmt.bg.default} "

# Colors (Tokyo Night)
foreground #a9b1d6
background #1a1b26

selection_foreground none
selection_background #28344a

color0  #414868
color8  #414868
color1  #f7768e
color9  #f7768e
color2  #73daca
color10 #73daca
color3  #e0af68
color11 #e0af68
color4  #7aa2f7
color12 #7aa2f7
color5  #bb9af7
color13 #bb9af7
color6  #7dcfff
color14 #7dcfff
color7  #c0caf5
color15 #c0caf5

# Keybindings
kitty_mod ctrl+shift

map cmd+enter       new_window

# Option key as Meta for terminal Emacs
macos_option_as_alt yes
map kitty_mod+l     next_window
map kitty_mod+h     previous_window

map alt+l           next_tab
map alt+h           previous_tab
map alt+t           new_tab
map alt+w           close_tab
map kitty_mod+;     next_layout

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
